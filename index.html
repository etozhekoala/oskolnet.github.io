<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oskolnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="pages/index.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="header__menu">
        <a href="#" class="header__logo"></a>
        <ul class="header__links">
          <li class="header__item">
            <a href="#" class="header__link">
              Тарифы для дома
            </a>
          </li>
          <li class="header__item">
            <a href="#" class="header__link">
              Тарифы для бизнеса
            </a>
          </li>
          <li class="header__item">
            <a href="#" class="header__link">
              Контакты
            </a>
          </li>
        </ul>
        <div class="header__phone">
          <a href="+7(4725)439720" class="header__number">
            +7 (4725) 43-97-20
          </a>
          <p class="header__phone-subtitle">
            круглосуточно
          </p>
        </div>
        <a href="#" class="button button_type_account">
          Личный кабинет
        </a>
        <a href="#" class="button button_type_pay">
          Оплатить
        </a>
      </nav>
    </div>
  </header>
  <main class="content">
    <section class="sliders">
      <div class="container">
        <div class="sliders__collection">
          <div class="sliders__slide">
            <div class="sliders__content-left">
              <h2 class="sliders__title">
                Интернет<span class="sliders__title_type_small-text">
                  на высокой скорости
                </span>
              </h2>
              <p class="sliders__description">
              </p>
              <button class="sliders__button">
                Выбрать тариф
              </button>
            </div>
            <div class="sliders__content-right">
              <img alt="Девушка с телефоном и кофе" src="./image/slide_img-1.png" class="sliders__image">
            </div>
            <div class="sliders__buttons-slide">
              <span class="sliders__btn-slide sliders__btn-slide_active"></span>
              <span class="sliders__btn-slide"></span>
              <span class="sliders__btn-slide"></span>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="rates">
      
    </section>
  </main>
</body>
</html>
